name: RX 6750 XT Price Tracker

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

# Prevent overlapping runs spamming Discord
concurrency: 
  group: price-tracker
  cancel-in-progress: true

jobs:
  tracker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-chromium-${{ runner.os }}
        restore-keys: |
          pw-chromium-${{ runner.os }}-

    - name: Install packages
      run: |
        pip install requests beautifulsoup4 playwright playwright-stealth

    - name: Install Playwright Chromium + system deps
      run: playwright install --with-deps chromium

    - name: Run tracker
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
      run: python RX6750XT_Notifier.py

    - name: Save price data
      run: |
        git config user.name "Price Tracker Bot"
        git config user.email "bot@tracker.local"
        git add prices.json
        git diff --cached --quiet || git commit -m "Update prices"
        git push
